name: CI · VSCode extension (per-project-plugin-toggler)

on:
  push:
    branches: [main]
    paths:
      - 'apps/per-project-plugin-toggler/**'
      - '.github/workflows/extension.yml'
  pull_request:
    paths:
      - 'apps/per-project-plugin-toggler/**'
      - '.github/workflows/extension.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/per-project-plugin-toggler

jobs:
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Check syntax
        run: python3 -m py_compile html/server.py

  css-sync:
    name: CSS sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync CSS
        run: cp html/styles.css vscode-extension/webview/styles.css
      - name: Assert no diff
        run: |
          git diff --exit-code vscode-extension/webview/styles.css || {
            echo "ERROR: vscode-extension/webview/styles.css is out of sync with html/styles.css"
            echo "Run: make sync-css"
            exit 1
          }

  lint-extension:
    name: ESLint (extension.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/per-project-plugin-toggler/vscode-extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/per-project-plugin-toggler/vscode-extension/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  package-check:
    name: vsce package check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/per-project-plugin-toggler/vscode-extension/package-lock.json
      - name: Install dependencies
        working-directory: apps/per-project-plugin-toggler/vscode-extension
        run: npm ci
      - name: Sync CSS
        run: cp html/styles.css vscode-extension/webview/styles.css
      - name: Package
        working-directory: apps/per-project-plugin-toggler/vscode-extension
        run: |
          mkdir -p dist
          npx vsce package --out dist/skills-toggle.vsix

  smoke-test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # html/server.py imports the in-repo claude-plugins library; `uv run`
      # syncs it (path dependency) and puts the venv python on PATH, which the
      # smoke scripts invoke as python3 / python.
      - name: Run smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: uv run bash tests/smoke.sh
      - name: Run smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: uv run pwsh -File tests/smoke.ps1
