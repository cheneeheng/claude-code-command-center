name: CI · Python

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: ruff (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - apps/multi-repo-plan-runner
          - apps/multi-repo-workspace
          - apps/per-project-plugin-toggler
          - apps/usage-dashboard
          - apps/claude-component-browser
          - tools/statusline-hook
          - tools/usage-report
          - libs/claude-usage
          - libs/claude-plugins
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: ruff check
        working-directory: ${{ matrix.member }}
        run: uv run ruff check .

  typecheck:
    name: mypy (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - member: apps/multi-repo-workspace
            target: roundtable
          - member: libs/claude-usage
            target: src
          - member: libs/claude-plugins
            target: src
          - member: tools/usage-report
            target: src
          - member: apps/claude-component-browser
            target: server.py
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: mypy
        working-directory: ${{ matrix.member }}
        run: uv run mypy ${{ matrix.target }}

  test:
    name: pytest (multi-repo-plan-runner)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/multi-repo-plan-runner
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: ruff format check
        run: uv run ruff format --check .
      - name: pytest (100% coverage gate)
        run: uv run pytest --cov-fail-under=100
      # Packaging smoke test: exercises importlib.resources resolution of the shipped
      # schema end to end (the $schema pointer in a fresh config) without needing `claude`.
      - name: packaging smoke test
        run: uv run docket init --dry-run

  test-roundtable:
    name: pytest (multi-repo-workspace)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/multi-repo-workspace
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: ruff format check
        run: uv run ruff format --check .
      - name: pytest (100% line+branch coverage gate)
        run: uv run pytest
      # Full-loop smoke: boots the real server against a fake `claude` and walks
      # board -> session -> order -> end turn -> review -> commit -> close.
      - name: smoke test
        run: uv run bash tests/smoke.sh

  smoke:
    name: Smoke test (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - apps/claude-component-browser
          - apps/usage-dashboard
          - tools/usage-report
          - tools/statusline-hook
    defaults:
      run:
        working-directory: ${{ matrix.member }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # `uv run` syncs the member (incl. any path deps) and puts the venv python
      # and console scripts on PATH, which tests/smoke.sh invokes.
      - name: Run smoke test
        run: uv run bash tests/smoke.sh

  libtest:
    name: pytest (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - libs/claude-usage
          - libs/claude-plugins
    defaults:
      run:
        working-directory: ${{ matrix.member }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      # Libraries have no boot surface: cover the public API with unit tests
      # behind a 100% coverage gate (configured in each member's pyproject.toml).
      - name: pytest (100% coverage gate)
        run: uv run pytest
