name: Release · VSCode extension (per-project-plugin-toggler)

# Independent of repo releases: push a pppt-v* tag (e.g. pppt-v0.9.1) to build
# and attach the extension .vsix. The tag must match vscode-extension/package.json.
on:
  push:
    tags: ['pppt-v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: apps/per-project-plugin-toggler

jobs:
  release:
    name: Build and attach .vsix
    runs-on: ubuntu-latest   # .vsix is platform-independent JS/webview — build once
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/per-project-plugin-toggler/vscode-extension/package-lock.json

      - name: Assert tag matches package.json
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#pppt-v}"
          PKG=$(node -p "require('./vscode-extension/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag pppt-v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Install dependencies
        working-directory: apps/per-project-plugin-toggler/vscode-extension
        run: npm ci

      - name: Sync canonical CSS/icon into webview
        run: |
          cp html/styles.css vscode-extension/webview/styles.css
          cp html/icon.svg vscode-extension/webview/icon.svg

      - name: Package extension
        working-directory: apps/per-project-plugin-toggler/vscode-extension
        run: |
          mkdir -p dist
          npx vsce package --out dist/skills-toggle.vsix

      - name: Attach .vsix to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: apps/per-project-plugin-toggler/vscode-extension/dist/skills-toggle.vsix
