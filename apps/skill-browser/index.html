<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Code Skill Browser</title>
  <style>
    :root {
      --bg: #f7f7f8; --panel: #fff; --ink: #1a1a1a; --muted: #5a5a66;
      --line: #e2e2e8; --accent: #5b3df5; --accent-ink: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 14px/1.5 system-ui, sans-serif; color: var(--ink);
      background: var(--bg); height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel);
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; }
    header .count { color: var(--muted); font-size: 12px; }
    #search {
      margin-left: auto; padding: 7px 10px; border: 1px solid var(--line);
      border-radius: 6px; font: inherit; min-width: 240px; background: var(--bg);
    }
    main { display: grid; grid-template-columns: minmax(260px, 360px) 1fr; flex: 1; min-height: 0; }
    #list { overflow-y: auto; border-right: 1px solid var(--line); background: var(--panel); }
    #list h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
      margin: 0; padding: 10px 14px 4px; position: sticky; top: 0; background: var(--panel);
    }
    .skill-btn {
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
      width: 100%; text-align: left; border: 0; background: none;
      padding: 7px 14px; font: inherit; color: var(--ink); cursor: pointer; border-radius: 0;
    }
    .skill-btn:hover { background: var(--bg); }
    .skill-btn[aria-current="true"] { background: var(--accent); color: var(--accent-ink); }
    .skill-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .scope, .kind {
      font-size: 10px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted);
      border: 1px solid var(--line); border-radius: 999px; padding: 1px 6px; flex-shrink: 0;
    }
    .badges { display: flex; gap: 5px; flex-shrink: 0; }
    .kind[data-kind="skill"] { color: #5b3df5; border-color: #cfc4fb; }
    .kind[data-kind="agent"] { color: #0a7d52; border-color: #b6e2cf; }
    .kind[data-kind="hook"]  { color: #b35309; border-color: #f0d3b0; }
    .skill-btn[aria-current="true"] .scope,
    .skill-btn[aria-current="true"] .kind { color: inherit; border-color: currentColor; }
    #detail { overflow-y: auto; padding: 20px 24px; }
    #detail .meta { color: var(--muted); font-size: 12px; margin: 0 0 4px; }
    #detail h2 { margin: 0 0 10px; font-size: 20px; }
    #detail .desc { color: var(--muted); margin: 0 0 18px; }
    #detail pre {
      white-space: pre-wrap; word-wrap: break-word; background: var(--panel);
      border: 1px solid var(--line); border-radius: 8px; padding: 16px; font-size: 13px;
      font-family: ui-monospace, monospace;
    }
    .empty { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Claude Code Browser</h1>
    <span class="count" id="count"></span>
    <input id="search" type="search" placeholder="Search skills, agents, hooks…"
           aria-label="Search skills, agents, and hooks">
  </header>
  <main>
    <nav id="list" aria-label="Skills, agents, and hooks"></nav>
    <article id="detail" aria-live="polite">
      <p class="empty">Select an item to view its details.</p>
    </article>
  </main>

  <script>
    let members = [];
    const listEl = document.getElementById('list');
    const detailEl = document.getElementById('detail');
    const countEl = document.getElementById('count');
    const searchEl = document.getElementById('search');

    function render(filter) {
      const q = filter.trim().toLowerCase();
      const matches = members.filter(m =>
        !q || m.name.toLowerCase().includes(q) || m.scope.toLowerCase().includes(q) ||
        m.kind.toLowerCase().includes(q) || m.plugin.toLowerCase().includes(q) ||
        m.description.toLowerCase().includes(q));

      listEl.replaceChildren();
      let currentPlugin = null;
      for (const m of matches) {
        if (m.plugin !== currentPlugin) {
          currentPlugin = m.plugin;
          const h = document.createElement('h2');
          h.textContent = m.plugin;
          listEl.appendChild(h);
        }
        const btn = document.createElement('button');
        btn.className = 'skill-btn';
        const nm = document.createElement('span');
        nm.textContent = m.name;
        const badges = document.createElement('span');
        badges.className = 'badges';
        const kd = document.createElement('span');
        kd.className = 'kind';
        kd.dataset.kind = m.kind;
        kd.textContent = m.kind;
        const sc = document.createElement('span');
        sc.className = 'scope';
        sc.textContent = m.scope;
        badges.append(kd, sc);
        btn.append(nm, badges);
        btn.title = m.description;
        btn.addEventListener('click', () => select(m, btn));
        listEl.appendChild(btn);
      }
      countEl.textContent = `${matches.length} of ${members.length} items`;
    }

    async function select(m, btn) {
      for (const b of listEl.querySelectorAll('.skill-btn'))
        b.removeAttribute('aria-current');
      btn.setAttribute('aria-current', 'true');

      detailEl.replaceChildren();
      const meta = document.createElement('p');
      meta.className = 'meta';
      meta.textContent = `${m.kind} · ${m.scope} · ${m.plugin} · ${m.marketplace} · v${m.version}`;
      const title = document.createElement('h2');
      title.textContent = m.name;
      const desc = document.createElement('p');
      desc.className = 'desc';
      desc.textContent = m.description;
      const pre = document.createElement('pre');
      pre.textContent = 'Loading…';
      detailEl.append(meta, title, desc, pre);

      try {
        const res = await fetch(`/api/member?id=${m.id}`);
        pre.textContent = res.ok ? await res.text() : 'Could not load this item.';
      } catch {
        pre.textContent = 'Could not load this item.';
      }
    }

    searchEl.addEventListener('input', () => render(searchEl.value));

    fetch('/api/members')
      .then(r => r.json())
      .then(data => { members = data; render(''); })
      .catch(() => { countEl.textContent = 'Failed to load items.'; });
  </script>
</body>
</html>
