<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Code Component Browser</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Claude Code Browser</h1>
    <span class="count" id="count"></span>
    <input id="search" type="search" placeholder="Search skills, agents, hooks…"
           aria-label="Search skills, agents, and hooks">
  </header>
  <form id="dirs" aria-label="Component sources">
    <label for="claude-dir">Claude dir</label>
    <input id="claude-dir" type="text" spellcheck="false" autocapitalize="off"
           placeholder="~/.claude">
    <label for="project-dir">Project dir</label>
    <input id="project-dir" type="text" spellcheck="false" autocapitalize="off"
           placeholder="project root">
    <button type="submit">Scan</button>
  </form>
  <main>
    <nav id="list" aria-label="Skills, agents, and hooks"></nav>
    <div id="resizer" role="separator" aria-orientation="vertical" tabindex="0"
         aria-label="Resize sidebar"></div>
    <article id="detail" aria-live="polite">
      <p class="empty">Select an item to view its details.</p>
    </article>
  </main>

  <script src="/markdown-it.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
